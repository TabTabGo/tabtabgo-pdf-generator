name: Trigger auto deployment for ca-generator

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/ca-generator-AutoDeployTrigger-b1c28e32-0c81-4616-9cb9-3121b3c73b24.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAGENERATOR_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAGENERATOR_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAGENERATOR_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: tabtabgo.azurecr.io
          registryUsername: ${{ secrets.CAGENERATOR_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAGENERATOR_REGISTRY_PASSWORD }}
          containerAppName: ca-generator
          resourceGroup: tabs
          imageToBuild: tabtabgo.azurecr.io/ca-generator:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_



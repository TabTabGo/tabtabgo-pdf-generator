name: Deployment for Document PDF services

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches:
      [ master ]

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=${{ github.run_number }}
          FULL_VERSION="${VERSION}-${BUILD_NUMBER}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "Docker image version: ${FULL_VERSION}"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SERVICES_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SERVICES_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SERVICES_AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SERVICES_REGISTRY_URL }}
          username: ${{ secrets.SERVICES_REGISTRY_USERNAME }}
          password: ${{ secrets.SERVICES_REGISTRY_PASSWORD }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.SERVICES_REGISTRY_URL }}/services-generator:${{ steps.version.outputs.full_version }}
            ${{ secrets.SERVICES_REGISTRY_URL }}/services-generator:latest

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-services-generator
          resourceGroup: tabs
          imageToDeploy: ${{ secrets.SERVICES_REGISTRY_URL }}/services-generator:${{ steps.version.outputs.full_version }}

      - name: Ensure secrets exist with defaults
        env:
          SERVICES_API_KEYS: ${{ secrets.SERVICES_API_KEYS }}
          SERVICES_ONLYOFFICE_JWT_SECRET: ${{ secrets.SERVICES_ONLYOFFICE_JWT_SECRET }}
        run: |
          # API_KEYS: use GitHub secret if set, otherwise fall back to a
          # hardcoded non-obvious key so deployment still succeeds.
          API_KEYS_VALUE="${SERVICES_API_KEYS}"
          if [[ -z "${API_KEYS_VALUE}" ]]; then
            API_KEYS_VALUE="ttg-services-generator-fallback-2026-05-11-8f64d2c1"
          fi

          az containerapp secret set \
            --name ca-services-generator \
            --resource-group tabs \
            --secrets \
              "services-api-keys=${API_KEYS_VALUE}"

          if [[ -n "${SERVICES_ONLYOFFICE_JWT_SECRET}" ]]; then
            az containerapp secret set \
              --name ca-services-generator \
              --resource-group tabs \
              --secrets \
                "services-onlyoffice-jwt-secret=${SERVICES_ONLYOFFICE_JWT_SECRET}"
          fi

      - name: Configure container app environment variables
        env:
          SERVICES_ONLYOFFICE_JWT_SECRET: ${{ secrets.SERVICES_ONLYOFFICE_JWT_SECRET }}
        run: |
          # PUPPETEER_EXECUTABLE_PATH is intentionally omitted: the startup script
          # discovers the real Chrome binary path at runtime via `find`, which handles
          # version-stamped subdirectory names without requiring a glob that Node won't expand.
          ENV_VARS=(
            API_KEYS=secretref:services-api-keys
            INTERNAL_ALLOWED_IPS="127.0.0.1,::1,::ffff:127.0.0.1"
          )

          if [[ -n "${SERVICES_ONLYOFFICE_JWT_SECRET}" ]]; then
            ENV_VARS+=(ONLYOFFICE_JWT_SECRET=secretref:services-onlyoffice-jwt-secret)
            az containerapp update \
              --name ca-services-generator \
              --resource-group tabs \
              --set-env-vars "${ENV_VARS[@]}"
          else
            az containerapp update \
              --name ca-services-generator \
              --resource-group tabs \
              --set-env-vars "${ENV_VARS[@]}" \
              --remove-env-vars ONLYOFFICE_JWT_SECRET
          fi

      - name: Configure ingress target port
        run: |
          az containerapp ingress enable \
            --name ca-services-generator \
            --resource-group tabs \
            --type external \
            --target-port 3000 \
            --transport auto

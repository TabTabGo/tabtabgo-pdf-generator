name: Deploy to Azure VM

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Azure Linux VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            ecosystem.config.cjs

      - name: Copy archive to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR=/opt/tabtabgo/generator

            # Ensure deploy directory exists
            mkdir -p $DEPLOY_DIR

            # Extract new build
            tar -xzf /tmp/deploy.tar.gz -C $DEPLOY_DIR
            rm /tmp/deploy.tar.gz

            # Install production dependencies
            cd $DEPLOY_DIR
            npm ci --omit=dev

            # Restart with PM2 using ecosystem config
            if pm2 describe tabtabgo-generator > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs
              pm2 save
            fi

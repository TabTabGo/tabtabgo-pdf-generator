services:
  pdf-generator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - WEBSITES_PORT=3000
      - NODE_ENV=production
      - ONLYOFFICE_DOCUMENT_SERVER_URL=${ONLYOFFICE_DOCUMENT_SERVER_URL:-http://127.0.0.1}
      - OFFICE_DOCUMENT_FETCH_BASE_URL=${OFFICE_DOCUMENT_FETCH_BASE_URL:-http://127.0.0.1:3000}
      - ONLYOFFICE_JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-}
      # IMPORTANT: Set API_KEYS environment variable before running
      # Example: export API_KEYS=your-secret-key-1,your-secret-key-2
      # Or use: API_KEYS=your-keys docker-compose up
      - API_KEYS=${API_KEYS}
    restart: unless-stopped
    # Optional: Mount a volume for persistent logs
    # volumes:
    #   - ./logs:/opt/tabtabgo-pdf-generator/logs
